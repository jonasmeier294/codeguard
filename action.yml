name: "GuardBot - AI Code Review"
description: "AI-powered code review for pull requests. Catches security issues, code smells, and performance problems."
author: "GuardBot"

branding:
  icon: "shield"
  color: "purple"

inputs:
  github_token:
    description: "GitHub token for posting review comments"
    required: true
    default: ${{ github.token }}
  openai_api_key:
    description: "OpenAI API key (optional, provide this or anthropic_api_key)"
    required: false
  anthropic_api_key:
    description: "Anthropic API key (optional, provide this or openai_api_key)"
    required: false
  model:
    description: "Model to use (e.g. gpt-4o, claude-sonnet-4-20250514)"
    required: false

runs:
  using: "node20"
  main: "action/dist/index.js"
