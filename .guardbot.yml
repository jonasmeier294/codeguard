# GuardBot Configuration
# Place this file in your repo root to customize reviews.
# Docs: https://guardbot.dev/docs/config

# Review depth: quick, standard, thorough
level: standard

# How to post results: comment, review, check-run
post_as: comment

# Fail CI on certain severity levels: none, critical, warning, info
fail_on: none

# Files to ignore (glob patterns)
ignore:
  - "*.lock"
  - "*.min.js"
  - "*.min.css"
  - "dist/**"
  - "build/**"
  - "node_modules/**"
  - "*.generated.*"
  - "__snapshots__/**"

# Maximum files to review per PR
max_files: 30

